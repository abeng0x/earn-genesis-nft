<script>

    const CONTRACT_ADDRESS =
      '0xA75ABf9725426F34b560E80B73Fa5403da3C967A';
  
    const ABI = [
  
      "function mint(address to, string memory uri) public",
  
      "function nextTokenId() view returns (uint256)",
  
      "function balanceOf(address owner) view returns (uint256)"
    ];
  
    const METADATA_URI =
      'https://gateway.pinata.cloud/ipfs/bafkreihgpyagb57cucqtgg6zfoakb4tfgbk7q7hnxggv4zafzk26gbe73e';
  
    const MAX_SUPPLY = 100;
  
    let signer;
  
    async function loadSupply() {
  
      try {
  
        const provider =
          new ethers.BrowserProvider(
            window.ethereum
          );
  
        const contract =
          new ethers.Contract(
  
            CONTRACT_ADDRESS,
  
            ABI,
  
            provider
          );
  
        const total =
          await contract.nextTokenId();
  
        document
          .getElementById(
            'supply'
          )
          .innerText =
  
          `Supply: ${total}/${MAX_SUPPLY}`;
  
        const percentage =
  
          (Number(total) / MAX_SUPPLY) * 100;
  
        document
          .getElementById(
            'progressBar'
          )
          .style.width =
  
          `${percentage}%`;
  
      } catch(err) {
  
        console.log(err);
      }
    }
  
    async function loadOwnedNFTs() {
  
      if (!signer) return;
  
      try {
  
        const provider =
          new ethers.BrowserProvider(
            window.ethereum
          );
  
        const contract =
          new ethers.Contract(
  
            CONTRACT_ADDRESS,
  
            ABI,
  
            provider
          );
  
        const address =
          await signer.getAddress();
  
        const balance =
          await contract.balanceOf(
            address
          );
  
        document
          .getElementById(
            'owned'
          )
          .innerText =
  
          `Your NFTs: ${balance}`;
  
      } catch(err) {
  
        console.log(err);
      }
    }
  
    async function loadGallery() {
  
      const grid =
        document.getElementById(
          'nftGrid'
        );
  
      grid.innerHTML = '';
  
      for (let i = 0; i < 3; i++) {
  
        grid.innerHTML += `
  
          <div class="nft-card">
  
            <img
              src="https://i.imgur.com/Eu4epbQ.jpeg"
            />
  
            <p>
              EARN Genesis #${i}
            </p>
  
          </div>
        `;
      }
    }
  
    async function switchToArcNetwork() {
  
      if (!window.ethereum) return;
  
      try {
  
        await window.ethereum.request({
  
          method: 'wallet_switchEthereumChain',
  
          params: [
  
            {
              chainId: '0x9C4'
            }
          ]
        });
  
      } catch (switchError) {
  
        try {
  
          await window.ethereum.request({
  
            method: 'wallet_addEthereumChain',
  
            params: [
  
              {
                chainId: '0x9C4',
  
                chainName: 'ARC Testnet',
  
                nativeCurrency: {
  
                  name: 'ARC',
  
                  symbol: 'ARC',
  
                  decimals: 18
                },
  
                rpcUrls: [
  
                  'https://rpc.testnet.arc.network'
                ],
  
                blockExplorerUrls: [
  
                  'https://testnet.arcscan.app'
                ]
              }
            ]
          });
  
        } catch(addError) {
  
          console.log(addError);
        }
      }
    }
  
    async function checkNetwork() {
  
      if (!window.ethereum) return;
  
      const chainId =
        await window.ethereum.request({
  
          method: 'eth_chainId'
        });
  
      if (chainId === '0x9C4') {
  
        document
          .getElementById(
            'networkStatus'
          )
          .innerText =
  
          '✅ Connected to ARC Testnet';
  
      } else {
  
        document
          .getElementById(
            'networkStatus'
          )
          .innerText =
  
          '❌ Wrong Network';
      }
    }
  
    async function checkWalletConnection() {
  
      if (!window.ethereum) return;
  
      const accounts =
        await window.ethereum.request({
  
          method: 'eth_accounts'
        });
  
      if (accounts.length > 0) {
  
        const provider =
          new ethers.BrowserProvider(
            window.ethereum
          );
  
        signer =
          await provider.getSigner();
  
        const address =
          await signer.getAddress();
  
        document
          .getElementById(
            'address'
          )
          .innerText =
  
          `Connected:
  
  ${address.slice(0,6)}...${address.slice(-4)}`;
  
        await loadSupply();
  
        await loadOwnedNFTs();
  
        await loadGallery();
  
        await checkNetwork();
  
        document
          .getElementById(
            'preview'
          )
          .style.display = 'block';
      }
    }
  
    async function connectWallet() {
  
      if (!window.ethereum) {
  
        alert(
          'Install MetaMask'
        );
  
        return;
      }
  
      await switchToArcNetwork();
  
      await window.ethereum.request({
  
        method: 'eth_requestAccounts'
      });
  
      const provider =
        new ethers.BrowserProvider(
          window.ethereum
        );
  
      signer =
        await provider.getSigner();
  
      const address =
        await signer.getAddress();
  
      document
        .getElementById(
          'address'
        )
        .innerText =
  
        `Connected:
  
  ${address.slice(0,6)}...${address.slice(-4)}`;
  
      alert(
        'Wallet Connected'
      );
  
      await loadSupply();
  
      await loadOwnedNFTs();
  
      await loadGallery();
  
      await checkNetwork();
  
      document
        .getElementById(
          'preview'
        )
        .style.display = 'block';
    }
  
    async function mintNFT() {
  
      if (!signer) {
  
        alert(
          'Connect wallet first'
        );
  
        return;
      }
  
      const mintButton =
        document.getElementById(
          'mint'
        );
  
      try {
  
        mintButton.disabled = true;
  
        mintButton.innerText =
          'Minting...';
  
        const contract =
          new ethers.Contract(
  
            CONTRACT_ADDRESS,
  
            ABI,
  
            signer
          );
  
        const address =
          await signer.getAddress();
  
        const tx =
          await contract.mint(
  
            address,
  
            METADATA_URI
          );
  
        mintButton.innerText =
          'Waiting Confirmation...';
  
        await tx.wait();
  
        mintButton.innerText =
          'Mint Success';
  
        window.open(
  
          `https://testnet.arcscan.app/tx/${tx.hash}`,
  
          '_blank'
        );
  
        await loadSupply();
  
        await loadOwnedNFTs();
  
        await loadGallery();
  
        await checkNetwork();
  
        document
          .getElementById(
            'preview'
          )
          .style.display = 'block';
  
        setTimeout(() => {
  
          mintButton.disabled = false;
  
          mintButton.innerText =
            'Mint NFT';
  
        }, 3000);
  
      } catch(err) {
  
        console.log(err);
  
        alert(
          err.message
        );
  
        mintButton.disabled = false;
  
        mintButton.innerText =
          'Mint NFT';
      }
    }
  
    document
      .getElementById('connect')
      .onclick =
        connectWallet;
  
    document
      .getElementById('mint')
      .onclick =
        mintNFT;
  
    window.ethereum.on(
  
      'chainChanged',
  
      async () => {
  
        await checkNetwork();
  
        await loadSupply();
  
        await loadOwnedNFTs();
      }
    );
  
    window.ethereum.on(
  
      'accountsChanged',
  
      async () => {
  
        await checkWalletConnection();
      }
    );
  
    checkWalletConnection();
  
    loadSupply();
  
  </script>
