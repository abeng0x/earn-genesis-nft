<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8" />

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
/>

<title>E A R N Genesis</title>

<script src="https://cdn.jsdelivr.net/npm/ethers@6.13.1/dist/ethers.umd.min.js"></script>

<style>

body{
  margin:0;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#050505;
  color:white;
  font-family:Arial;
  padding:20px;
}

.card{
  width:420px;
  background:#111827;
  border-radius:24px;
  padding:24px;
}

.hero{
  width:100%;
  border-radius:18px;
  margin-bottom:20px;
}

button{
  width:100%;
  padding:15px;
  border:none;
  border-radius:14px;
  margin-top:12px;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
}

.primary{
  background:#00ffa3;
  color:black;
}

.secondary{
  background:#1f2937;
  color:white;
}

#address{
  margin-top:14px;
  color:#00ffa3;
  font-size:14px;
}

#status{
  margin-top:10px;
}

</style>

</head>

<body>

<div class="card">

<img
  class="hero"
  src="https://i.imgur.com/Eu4epbQ.jpeg"
/>

<h1>E A R N Genesis</h1>

<p>
ARC Testnet NFT Collection
</p>

<br>

<p>
Mint Price: FREE
</p>

<p id="supply">
Supply: Loading...
</p>

<p id="owned">
Your NFTs: 0
</p>

<button
  id="connect"
  class="primary"
>
Connect Wallet
</button>

<p id="address">
Not Connected
</p>

<p id="status">
Status: Idle
</p>

<button
  id="mint"
  class="primary"
>
Mint NFT
</button>

<a
  href="https://testnet.arcscan.app/address/0xA75ABf9725426F34b560E80B73Fa5403da3C967A"
  target="_blank"
>

<button class="secondary">
View Contract
</button>

</a>

</div>

<script>

const CONTRACT_ADDRESS =
'0xA75ABf9725426F34b560E80B73Fa5403da3C967A';

const ABI = [

"function mint(string memory uri) public",

"function nextTokenId() view returns(uint256)",

"function balanceOf(address owner) view returns(uint256)"
];

const METADATA_URI =
'https://gateway.pinata.cloud/ipfs/bafkreihgpyagb57cucqtgg6zfoakb4tfgbk7q7hnxggv4zafzk26gbe73e';

const ARC_CHAIN_ID =
'0x4cef52';

let signer;

async function connectWallet(){

  try{

    if(!window.ethereum){

      alert('Install MetaMask');

      return;
    }

    await window.ethereum.request({

      method:'wallet_addEthereumChain',

      params:[{

        chainId:'0x4cef52',

        chainName:'Arc Testnet',

        nativeCurrency:{

          name:'USDC',

          symbol:'USDC',

          decimals:18
        },

        rpcUrls:[
          'https://rpc.testnet.arc.network'
        ],

        blockExplorerUrls:[
          'https://testnet.arcscan.app'
        ]
      }]
    });

    await window.ethereum.request({

      method:'wallet_switchEthereumChain',

      params:[{
        chainId:'0x4cef52'
      }]
    });

    await window.ethereum.request({

      method:'eth_requestAccounts'
    });

    const provider =
      new ethers.BrowserProvider(
        window.ethereum
      );

    signer =
      await provider.getSigner();

    const address =
      await signer.getAddress();

    document
      .getElementById(
        'address'
      )
      .innerText =

      address;

    document
      .getElementById(
        'status'
      )
      .innerText =

      'Status: Connected';

    await loadData();

  }catch(err){

    console.log(err);

    alert(err.message);
  }
}

async function loadData(){

  try{

    const provider =
      new ethers.BrowserProvider(
        window.ethereum
      );

    const contract =
      new ethers.Contract(

        CONTRACT_ADDRESS,

        ABI,

        provider
      );

    const supply =
      await contract.nextTokenId();

    document
      .getElementById(
        'supply'
      )
      .innerText =

      `Supply: ${supply}/100`;

    if(signer){

      const address =
        await signer.getAddress();

      const owned =
        await contract.balanceOf(
          address
        );

      document
        .getElementById(
          'owned'
        )
        .innerText =

        `Your NFTs: ${owned}`;
    }

  }catch(err){

    console.log(err);
  }
}

async function mintNFT(){

  try{

    if(!signer){

      alert(
        'Connect wallet first'
      );

      return;
    }

    document
      .getElementById(
        'status'
      )
      .innerText =

      'Status: Minting...';

    const contract =
      new ethers.Contract(

        CONTRACT_ADDRESS,

        ABI,

        signer
      );

    const tx =
      await contract.mint(
        METADATA_URI
      );

    await tx.wait();

    document
      .getElementById(
        'status'
      )
      .innerText =

      'Status: Mint Success';

    await loadData();

    window.open(

      `https://testnet.arcscan.app/tx/${tx.hash}`,

      '_blank'
    );

  }catch(err){

    console.log(err);

    alert(err.message);

    document
      .getElementById(
        'status'
      )
      .innerText =

      'Status: Failed';
  }
}

document
  .getElementById(
    'connect'
  )
  .onclick =
    connectWallet;

document
  .getElementById(
    'mint'
  )
  .onclick =
    mintNFT;

loadData();

</script>

</body>
</html>
